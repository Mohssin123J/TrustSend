version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=mysql://trustsend_user:trustsend_pass@db:3306/trustsend_db
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: trustsend_db
      MYSQL_USER: trustsend_user
      MYSQL_PASSWORD: trustsend_pass
      MYSQL_ROOT_PASSWORD: trustsend_root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
